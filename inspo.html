<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestra Boda · Inspiración</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rust:     #9B4A2E;
      --mauve:    #A85C78;
      --sage:     #4A6B44;
      --bg:       #F7F2EA;
      --card:     #FDFAF6;
      --input-bg: #F2EDE4;
      --text:     #2C3A28;
      --muted:    #5A6E52;
      --light:    #D4C5B5;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────── */
    header {
      text-align: center;
      padding: 64px 20px 36px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--text);
    }
    header .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 10px;
    }
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 22px;
    }
    .ornament::before, .ornament::after {
      content: '';
      height: 1px;
      width: 72px;
      background: var(--mauve);
    }
    .ornament span { color: var(--mauve); font-size: 9px; }

    /* ── MAIN ────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── CARD ────────────────────────────────── */
    .card {
      position: relative;
      background: var(--card);
      border-radius: 18px;
      padding: 34px 38px;
      display: grid;
      grid-template-columns: 210px 1fr;
      grid-template-rows: auto auto;
      column-gap: 30px;
      row-gap: 0;
      align-items: start;
      box-shadow: 0 2px 14px rgba(44,58,40,.08);
    }

    .card-left { display: flex; flex-direction: column; gap: 10px; }

    .card-num {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--mauve);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-num::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--light);
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.55rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
    }
    .card-label {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sage);
      opacity: 0.9;
    }
    .notes {
      background: var(--input-bg);
      border: 1.5px solid var(--light);
      border-radius: 10px;
      padding: 13px 15px;
      font-family: 'Lato', sans-serif;
      font-size: 0.86rem;
      color: var(--text);
      line-height: 1.65;
      min-height: 82px;
      outline: none;
      resize: vertical;
      transition: border-color .2s;
      margin-top: 4px;
    }
    .notes:focus { border-color: var(--mauve); }
    .notes:empty::before { content: attr(data-ph); color: var(--muted); opacity: .6; }

    /* ── PHOTOS ──────────────────────────────── */
    .photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .slot {
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--input-bg);
      border: 2px dashed var(--light);
      transition: border-color .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot:hover { border-color: var(--mauve); transform: scale(1.015); }
    .slot.filled { border: none; }
    .slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slot-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
      border-radius: 12px;
    }
    .slot.filled:hover .slot-overlay { opacity: 1; }
    .slot-overlay svg { color: #fff; width: 28px; height: 28px; }
    .add-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 8px;
    }
    .add-hint svg { width: 26px; height: 26px; opacity: .5; }

    /* ── QUESTIONS AREA ──────────────────────── */
    .questions-area {
      grid-column: 1 / -1;
      border-top: 1px solid var(--light);
      margin-top: 28px;
      padding-top: 24px;
    }
    .questions-header {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 16px;
    }
    .questions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 24px;
    }
    .q-item { display: flex; flex-direction: column; gap: 5px; }
    .q-item.full { grid-column: 1 / -1; }
    .q-label {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .q-input {
      background: var(--input-bg);
      border: 1.5px solid var(--light);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .q-input:focus { border-color: var(--mauve); }
    .q-input::placeholder { color: var(--muted); opacity: .5; }
    textarea.q-input { resize: vertical; min-height: 72px; line-height: 1.5; }

    /* ── MODAL ───────────────────────────────── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,58,40,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 18px;
      padding: 32px 36px;
      width: min(440px, 90vw);
      box-shadow: 0 20px 60px rgba(44,58,40,.18);
    }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--text);
    }
    .modal input[type="url"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--light);
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      transition: border-color .2s;
    }
    .modal input[type="url"]:focus { border-color: var(--mauve); }
    .modal-hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.83rem;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-cancel { background: var(--light); color: var(--muted); }
    .btn-confirm { background: var(--rust); color: #fff; }

    /* ── CARD CONTROLS ───────────────────────── */
    .card-controls {
      position: absolute;
      top: 14px; right: 16px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover .card-controls { opacity: 1; }

    .ctrl-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1.5px solid var(--light);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .ctrl-btn:hover { border-color: var(--mauve); color: var(--text); }
    .ctrl-btn.photos-on { color: var(--sage); border-color: var(--sage); }
    .ctrl-btn svg { width: 14px; height: 14px; pointer-events: none; }

    /* ── ADD SECTION ─────────────────────────── */
    .add-section { display: flex; justify-content: center; padding: 8px 0 24px; }
    .add-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 32px;
      border-radius: 50px;
      border: 2px dashed var(--light);
      background: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .add-btn:hover { border-color: var(--sage); color: var(--sage); }
    .add-btn svg { width: 15px; height: 15px; }

    .new-card {
      background: var(--card);
      border-radius: 18px;
      padding: 28px 38px;
      box-shadow: 0 2px 14px rgba(44,58,40,.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .new-card h4 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }
    .new-row { display: flex; gap: 12px; }
    .field-inp {
      flex: 1;
      background: var(--input-bg);
      border: 1.5px solid var(--light);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .field-inp:focus { border-color: var(--mauve); }
    .field-inp::placeholder { color: var(--muted); opacity: .5; }
    .new-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 680px) {
      .card { grid-template-columns: 1fr; padding: 24px 20px; }
      .questions-grid { grid-template-columns: 1fr; }
      .q-item.full { grid-column: 1; }
      .card-controls { opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>Nuestra Boda</h1>
  <p class="subtitle">Cesar &amp; Lissette · 13 Marzo 2027</p>
  <div class="ornament"><span>◆</span></div>
</header>

<main id="container"></main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Añadir inspiración</h3>
    <input type="url" id="url-input" placeholder="https://i.pinimg.com/…" />
    <p class="modal-hint">Pega la URL de la imagen desde Pinterest, Google Images, etc.</p>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn btn-confirm" id="modal-confirm">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:            'AIzaSyATR-1uUqpJFZAG9OPOjxYas7DjvEEVRCo',
  authDomain:        'boda-cesar-lissette.firebaseapp.com',
  projectId:         'boda-cesar-lissette',
  storageBucket:     'boda-cesar-lissette.firebasestorage.app',
  messagingSenderId: '1080316555242',
  appId:             '1:1080316555242:web:48614150034617521ecc93',
}, 'inspo');

const db        = getFirestore(app);
const INSPO_REF = doc(db, 'inspo', 'data');

// ── Estado ────────────────────────────────────────────────
let state = { notes: {}, answers: {}, photos: {}, settings: {}, customSections: [] };
let firstLoad = true;
let lastFp = '';

const BASE_SECTIONS = [
  {
    id: 'general', num: '00', label: 'La boda', title: 'Datos generales',
    ph: 'Notas generales sobre el día…',
    questions: [
      { id: 'nombre_novia',    label: 'Nombre de la novia' },
      { id: 'nombre_novio',    label: 'Nombre del novio' },
      { id: 'fecha_boda',      label: 'Fecha de la boda' },
      { id: 'lugar_ceremonia', label: 'Lugar de la ceremonia' },
      { id: 'tipo_ceremonia',  label: 'Iglesia o ceremonia con juez' },
      { id: 'hora_ceremonia',  label: 'Horario de inicio de la ceremonia' },
      { id: 'hora_recepcion',  label: 'Horario de la recepción' },
      { id: 'lista_invitados', label: '¿Tiene el listado de invitados listo?' },
      { id: 'orden_mesas',     label: '¿Sentará las personas por orden de mesas?' },
      { id: 'contacto_dia',    label: 'Persona de contacto el día de la boda' },
      { id: 'tel_contacto',    label: 'Teléfono de contacto' },
      { id: 'observaciones',   label: 'Observaciones importantes', multi: true, full: true },
    ]
  },
  {
    id: 'vestido', num: '01', label: 'El Vestido', title: 'Vestido de novia',
    ph: 'Estilo, silueta, tela, escote, cola, detalles…',
    questions: [
      { id: 'estilo_vestido', label: 'Estilo del vestido' },
      { id: 'tiene_vestido',  label: '¿Tiene el vestido?' },
    ]
  },
  {
    id: 'maquillaje', num: '02', label: 'Beauty Look', title: 'Maquillaje & Peinado',
    ph: 'Estilo de maquillaje, tipo de peinado, accesorios…',
    questions: [
      { id: 'estilo_maquillaje',  label: 'Estilo de maquillaje' },
      { id: 'tiene_maquillista',  label: '¿Tiene maquillista?' },
      { id: 'hora_maquillista',   label: 'Hora de llegada de la maquillista' },
      { id: 'hora_novia_lista',   label: 'Hora estimada en que la novia estará lista' },
    ]
  },
  {
    id: 'flores', num: '03', label: 'Inspiración floral', title: 'Flores y arreglos',
    ph: 'Flores favoritas, paleta de colores, estilo del ramo…',
    questions: [
      { id: 'estilo_ramo',    label: 'Estilo de ramo para novia' },
      { id: 'cant_ramos',     label: 'Cantidad de ramos' },
    ]
  },
  {
    id: 'damas', num: '04', label: 'Las damas', title: 'Damas de honor',
    ph: 'Color de vestidos, estilo, cantidad de damas…',
    questions: [
      { id: 'color_damas',        label: 'Color de vestido de las damas' },
      { id: 'cant_damas',         label: 'Cantidad de damas' },
      { id: 'tiene_dama_honor',   label: '¿Tiene dama de honor?' },
      { id: 'dama_honor_ramo',    label: '¿La dama de honor lleva ramo?' },
    ]
  },
  {
    id: 'decoracion', num: '05', label: 'Ambiente y decor', title: 'Decoración',
    ph: 'Mesas, centros de mesa, iluminación, mobiliario…',
    questions: [
      { id: 'tiene_mobiliario',    label: '¿Tiene alquiler de mobiliario?' },
      { id: 'prov_mobiliario',     label: 'Proveedor y teléfono (mobiliario)' },
      { id: 'tiene_tarima',        label: '¿Tiene tarima?' },
      { id: 'prov_tarima',         label: 'Proveedor y teléfono (tarima)' },
    ]
  },
  {
    id: 'pastel', num: '06', label: 'El dulce momento', title: 'Pastel de boda',
    ph: 'Sabores, pisos, decoración, colores…',
    questions: [
      { id: 'tiene_pastelera',  label: '¿Tiene pastelera?' },
      { id: 'nombre_pastelera', label: 'Nombre y teléfono (pastelera)' },
    ]
  },
  {
    id: 'foto', num: '07', label: 'Memorias', title: 'Fotografía & Video',
    ph: 'Estilo fotográfico, referencias, momentos clave…',
    questions: [
      { id: 'tiene_fotografo',  label: '¿Tiene fotógrafo contratado?' },
      { id: 'nombre_fotografo', label: 'Nombre del fotógrafo' },
      { id: 'tel_fotografo',    label: 'Teléfono del fotógrafo' },
      { id: 'tiene_videografo', label: '¿Tiene videógrafo contratado?' },
      { id: 'nombre_videografo',label: 'Nombre del videógrafo' },
      { id: 'tel_videografo',   label: 'Teléfono del videógrafo' },
    ]
  },
  {
    id: 'musica', num: '08', label: 'La música', title: 'DJ & Entretenimiento',
    ph: 'Géneros, artistas, momentos especiales…',
    questions: [
      { id: 'tiene_dj',       label: '¿Tiene DJ?' },
      { id: 'nombre_dj',      label: 'Nombre y teléfono del DJ' },
      { id: 'tiene_musicos',  label: '¿Tiene músicos en vivo?' },
      { id: 'nombre_musicos', label: 'Nombre o agrupación y teléfono' },
      { id: 'tiene_mc',       label: '¿Tiene maestro de ceremonias?' },
      { id: 'nombre_mc',      label: 'Nombre y teléfono (MC)' },
      { id: 'tiene_sonido',   label: '¿Tiene servicio de sonido?' },
      { id: 'prov_sonido',    label: 'Proveedor y teléfono (sonido)' },
    ]
  },
  {
    id: 'catering', num: '09', label: 'Catering & logística', title: 'Buffet & Bebidas',
    ph: 'Menú, bebidas, detalles de servicio…',
    questions: [
      { id: 'tiene_bufe',    label: '¿Tiene servicio de bufé?' },
      { id: 'nombre_bufe',   label: 'Nombre y teléfono del bufé' },
      { id: 'tiene_bebidas', label: '¿Tiene suplidor de bebidas?' },
      { id: 'prov_bebidas',  label: 'Proveedor y teléfono (bebidas)' },
    ]
  },
];

// ── Firestore ─────────────────────────────────────────────
let saveTimer;
function persistState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    setDoc(INSPO_REF, state, { merge: true }).catch(console.error);
  }, 600);
}

onSnapshot(INSPO_REF, snap => {
  if (snap.exists()) {
    const d = snap.data();
    state.notes          = d.notes          || {};
    state.answers        = d.answers        || {};
    state.photos         = d.photos         || {};
    state.settings       = d.settings       || {};
    state.customSections = d.customSections || [];
  }
  const fp = sectionsFp();
  if (firstLoad || fp !== lastFp) {
    renderAll(); firstLoad = false; lastFp = fp;
  } else {
    syncDOM();
  }
});

function sectionsFp() {
  return getSections().map(s => s.id + (getSettings(s.id).showPhotos ? '1' : '0')).join(',');
}

function syncDOM() {
  const focused = document.activeElement;
  document.querySelectorAll('.notes[data-id]').forEach(el => {
    if (el !== focused) { const v = state.notes[el.dataset.id] || ''; if (el.innerHTML !== v) el.innerHTML = v; }
  });
  document.querySelectorAll('.q-input[data-qid]').forEach(el => {
    if (el !== focused) { const v = state.answers[el.dataset.qid] || ''; if (el.value !== v) el.value = v; }
  });
  getSections().forEach(sec => renderPhotos(sec.id));
}

// ── Secciones ─────────────────────────────────────────────
function getSections() {
  return [...BASE_SECTIONS.filter(s => !state.settings[s.id]?.hidden), ...state.customSections];
}
function getSettings(secId) {
  return { showPhotos: true, ...state.settings[secId] };
}

// ── Controles por sección ─────────────────────────────────
function togglePhotos(secId) {
  const cur = getSettings(secId).showPhotos;
  state.settings[secId] = { ...getSettings(secId), showPhotos: !cur };
  persistState();
  const photosEl = document.querySelector(`.photos[data-id="${secId}"]`);
  if (photosEl) photosEl.style.display = !cur ? '' : 'none';
  const btn = document.querySelector(`[data-toggle="${secId}"]`);
  if (btn) { btn.classList.toggle('photos-on', !cur); btn.title = !cur ? 'Ocultar fotos' : 'Mostrar fotos'; }
  lastFp = sectionsFp();
}

function hideSection(secId) {
  state.settings[secId] = { ...getSettings(secId), hidden: true };
  persistState();
  document.querySelector(`.card[data-sec="${secId}"]`)?.remove();
  lastFp = sectionsFp();
}

function deleteCustom(secId) {
  state.customSections = state.customSections.filter(s => s.id !== secId);
  delete state.photos[secId]; delete state.notes[secId];
  persistState();
  document.querySelector(`.card[data-sec="${secId}"]`)?.remove();
  lastFp = sectionsFp();
}

// ── Modal ─────────────────────────────────────────────────
let pendingSection = null, pendingIdx = null;
const modalBg  = document.getElementById('modal');
const urlInput = document.getElementById('url-input');

document.getElementById('modal-cancel').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmModal(); });
document.getElementById('modal-confirm').addEventListener('click', confirmModal);

function confirmModal() {
  const url = urlInput.value.trim(); if (!url) return;
  setPhoto(pendingSection, pendingIdx, url); closeModal();
}
function openModal(secId, idx) {
  pendingSection = secId; pendingIdx = idx; urlInput.value = '';
  modalBg.classList.add('open'); setTimeout(() => urlInput.focus(), 50);
}
function closeModal() { modalBg.classList.remove('open'); }

// ── Fotos ─────────────────────────────────────────────────
function getPhotos(secId) { return state.photos[secId] || ['', '', '']; }

function setPhoto(secId, idx, url) {
  const p = [...getPhotos(secId)]; p[idx] = url;
  state.photos[secId] = p; persistState(); renderPhotos(secId);
}
function removePhoto(secId, idx) {
  const p = [...getPhotos(secId)]; p[idx] = '';
  state.photos[secId] = p; persistState(); renderPhotos(secId);
}
function renderPhotos(secId) {
  const grid = document.querySelector(`.photos[data-id="${secId}"]`);
  if (!grid) return;
  grid.innerHTML = getPhotos(secId).map((url, i) => `
    <div class="slot ${url ? 'filled' : ''}" data-section="${secId}" data-idx="${i}">
      ${url
        ? `<img src="${url}" alt="" loading="lazy"/>
           <div class="slot-overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
           </svg></div>`
        : `<div class="add-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
             <rect x="3" y="3" width="18" height="18" rx="3"/>
             <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
           </svg><span>Añadir<br>foto</span></div>`}
    </div>`).join('');
  grid.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('click', () => {
      const s = slot.dataset.section, i = parseInt(slot.dataset.idx);
      slot.classList.contains('filled') ? removePhoto(s, i) : openModal(s, i);
    });
  });
}

// ── Render ────────────────────────────────────────────────
const IC_CAM = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
const IC_DEL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

function buildCard(sec) {
  const s  = getSettings(sec.id);
  const qHTML = (sec.questions || []).length ? `
    <div class="questions-area">
      <div class="questions-header">Checklist Decoarte</div>
      <div class="questions-grid">
        ${sec.questions.map(q => `
          <div class="q-item${q.full ? ' full' : ''}">
            <label class="q-label" for="q_${q.id}">${q.label}</label>
            ${q.multi
              ? `<textarea class="q-input" id="q_${q.id}" data-qid="${q.id}" placeholder="…">${state.answers[q.id] || ''}</textarea>`
              : `<input class="q-input" id="q_${q.id}" data-qid="${q.id}" type="text" placeholder="…" value="${(state.answers[q.id] || '').replace(/"/g, '&quot;')}" />`}
          </div>`).join('')}
      </div>
    </div>` : '';

  const card = document.createElement('div');
  card.className = 'card'; card.dataset.sec = sec.id;
  card.innerHTML = `
    <div class="card-controls">
      <button class="ctrl-btn ${s.showPhotos ? 'photos-on' : ''}" data-toggle="${sec.id}"
        title="${s.showPhotos ? 'Ocultar fotos' : 'Mostrar fotos'}">${IC_CAM}</button>
      <button class="ctrl-btn" data-delete="${sec.id}"
        title="${sec.custom ? 'Eliminar sección' : 'Ocultar sección'}">${IC_DEL}</button>
    </div>
    <div class="card-left">
      <div class="card-num">${sec.num}</div>
      <div class="card-title">${sec.title}</div>
      <div class="card-label">${sec.label}</div>
      <div class="notes" contenteditable="true" data-id="${sec.id}" data-ph="${sec.ph || 'Notas…'}" spellcheck="false">${state.notes[sec.id] || ''}</div>
    </div>
    <div class="photos" data-id="${sec.id}" ${s.showPhotos ? '' : 'style="display:none"'}></div>
    ${qHTML}`;

  card.querySelector('[data-toggle]').addEventListener('click', () => togglePhotos(sec.id));
  card.querySelector('[data-delete]').addEventListener('click', () =>
    sec.custom ? deleteCustom(sec.id) : hideSection(sec.id));

  const notesEl = card.querySelector('.notes');
  let nt; notesEl.addEventListener('input', () => {
    clearTimeout(nt); nt = setTimeout(() => { state.notes[sec.id] = notesEl.innerHTML; persistState(); }, 400);
  });
  card.querySelectorAll('.q-input').forEach(el => {
    let at; el.addEventListener('input', () => {
      clearTimeout(at); at = setTimeout(() => { state.answers[el.dataset.qid] = el.value; persistState(); }, 400);
    });
  });
  return card;
}

function renderAddSection(container) {
  const wrap = document.createElement('div');
  wrap.id = 'add-area'; wrap.className = 'add-section';
  wrap.innerHTML = `<button class="add-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Añadir sección</button>`;
  wrap.querySelector('button').addEventListener('click', () => showAddForm(container));
  container.appendChild(wrap);
}

function showAddForm(container) {
  document.getElementById('add-area')?.remove();
  const nc = document.createElement('div'); nc.className = 'new-card'; nc.id = 'add-area';
  nc.innerHTML = `
    <h4>Nueva sección</h4>
    <div class="new-row">
      <input class="field-inp" id="nt" placeholder="Título  (ej. Transporte)" />
      <input class="field-inp" id="nl" placeholder="Etiqueta  (ej. Llegada al lugar)" />
    </div>
    <div class="new-actions">
      <button class="btn btn-cancel" id="nc-cancel">Cancelar</button>
      <button class="btn btn-confirm" id="nc-ok">Crear</button>
    </div>`;
  container.appendChild(nc);
  document.getElementById('nt').focus();

  document.getElementById('nc-cancel').addEventListener('click', renderAll);
  document.getElementById('nc-ok').addEventListener('click', () => {
    const title = document.getElementById('nt').value.trim(); if (!title) return;
    const label = document.getElementById('nl').value.trim() || title;
    const id = 'c_' + Date.now();
    const num = String(getSections().length + 1).padStart(2, '0');
    state.customSections.push({ id, num, label, title, ph: 'Notas…', questions: [], custom: true });
    persistState(); renderAll();
  });
  document.getElementById('nt').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('nl').focus(); });
  document.getElementById('nl').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('nc-ok').click(); });
}

function renderAll() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  getSections().forEach(sec => { container.appendChild(buildCard(sec)); renderPhotos(sec.id); });
  renderAddSection(container);
  lastFp = sectionsFp();
}
</script>
</body>
</html>
